<html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tugas Pemograman Web HTML</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

       
        main-table {
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 2px solid #2c3e50; /* Border = 2 */
            overflow: hidden;
            border-radius: 8px;
        }

                .header {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 20px;
        }

        
        .sidebar {
            background-color: #34495e;
            color: white;
            padding: 20px;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar li {
            margin-bottom: 15px;
        }

        .sidebar a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
            display: block;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #3498db;
            color: white;
        }

       
        .content-area {
            background-color: #ffffff;
            padding: 0;
        }

        iframe {
            border: none;
            background-color: gray;
        }

        
        .footer {
            background-color: #bdc3c7;
            color: #2c3e50;
            font-size: 0.9em;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <table class="main-table" width="850" height="550">
        <tr>
            <td colspan="2" class="header" align="center">
                <h1>My Biodata</h1>
            </td>
        </tr>

        <tr>
            <td class="sidebar" width="25%" valign="top">
                <h3>Menu</h3>
                <ul>
                    <li><a href="home.html" target="center table">Home</a></li>
                    <li><a href="profile.html" target="center table">Profile</a></li>
                    <li><a href="latihan1.html" target="center table">Latihan 1</a></li>
                    <li><a href="latihan2.html" target="center table">Latihan 2</a></li>
                </ul>
            </td>

            <td class="content-area" width="75%" valign="top">
                <iframe name="center table" width="100%" height="450">
                </iframe>
            </td>
        </tr>

        <tr>
            <td colspan="2" class="footer" align="center" height="40">
                Made by who? that's right KING RAFLY!!!
            </td>
        </tr>
    </table>

</body>
</html>
